
- hosts: all
  vars:
    kubeconfig: ~/.kube/config_rpi
    reboot: false
    user: pi

  gather_facts: False

  tasks:

  - name: Unblock WiFI
    command: /usr/sbin/rfkill unblock all

  # See https://docs.python.org/3/library/re.html for further details on syntax
  #  Use backrefs with alternative group syntax to avoid conflicts with variable values
  - name: Update /boot/cmdline.txt to allow cgroups
    become: true
    ansible.builtin.lineinfile:
      path: /boot/cmdline.txt
      regexp: ^(console=serial0,115200 console=tty1) root=PARTUUID=([0-9a-z-]*) rootfstype=ext4 fsck.repair=yes rootwait
      line: \g<1> root=PARTUUID=\g<2> rootfstype=ext4 fsck.repair=yes rootwait cgroup_memory=1 cgroup_enable=memory
      backrefs: yes

  - name: Install docker (for unifi controller)
    become: true
    apt:
      pkg:
      - docker.io
      - docker-compose

  - name: Copy docker-compose file for unifi controller
    copy:
      src: "{{ playbook_dir }}/files/unifi-docker-compose.yaml"
      dest: $HOME
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: 0600

  - name: Enable unifi controller's container
    become: true
    command: usermod -a -G docker {{ user }}

  - name: Enable unifi controller's container
    command: docker-compose -f $HOME/unifi-docker-compose.yaml up -d

  - name: Update all packages to their latest version
    become: true
    apt:
      name: "*"
      state: latest
      update_cache: yes

  - name: Run the equivalent of "apt-get clean" as a separate step
    become: true
    apt:
      clean: yes

  - name: Reboot the machine with all defaults
    become: true
    reboot:
    when: reboot

  - name: Download k3s installation script
    get_url:
      url: https://get.k3s.io
      dest: /tmp/k3s.sh
      mode: '0700'

  - name: Install k3s
    shell: K3S_TOKEN=kora INSTALL_K3S_CHANNEL=latest K3S_KUBECONFIG_MODE="666" /tmp/k3s.sh server
    args:
      creates: /etc/rancher/k3s/k3s.yaml

  - name: Fetch KUBECONFIG to {{ kubeconfig }}
    fetch:
      src: /etc/rancher/k3s/k3s.yaml
      dest: "{{ kubeconfig }}"
      flat: yes

  - name: Amend KUBECONFIG's 127.0.0.1 to rpi IP {{ ansible_host }}
    delegate_to: 127.0.0.1
    lineinfile:
      path: "{{ kubeconfig }}"
      regexp: ^(\s*)server{{ ":" }} https://127.0.0.1:6443
      line: \g<1>server{{ ":" }} https://{{ ansible_host }}:6443
      backrefs: yes

  - name: Copy traefik helm chart config
    become: true
    copy:
      src: "{{ playbook_dir }}/files/traefik-config.yaml"
      dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
      owner: root
      group: root
      mode: 0600
